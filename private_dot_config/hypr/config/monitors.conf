 # Main Monitor
monitorv2 {
  output = DP-2
  mode = 3440x1440@165
  position = 0x0
  scale = 1
  supports_wide_color = 1
  supports_hdr = 1
  sdr_min_luminance = 0.005
  sdr_max_luminance = 200
  vrr = 3
  cm = auto
  bitdepth = auto
}


# Headless Monitor (Sunshine iPad Pro)
monitorv2 {
  output = HEADLESS-2
  # mode = 3840x2160@120
  mode = 2732x2048@120
  position = -3440x0
  scale = 2
  supports_wide_color = 1
  supports_hdr = 1
}

